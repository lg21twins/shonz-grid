name: Update Standings

on:
  schedule:
    - cron: "0 3,5,7,9,11,13,15 * * 0" # 매주 일요일 12:00~24:00 KST (2시간 간격)
  workflow_dispatch: # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger standings update
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://src-eight-steel.vercel.app/api/cron/update-standings"
